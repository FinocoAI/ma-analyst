version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8010:8000"
    volumes:
      - ./backend/app:/app/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./ma_prospecting.db

  frontend:
    build: ./frontend
    ports:
      - "3010:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/hooks:/app/hooks
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - fe_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://0.0.0.0:8010
    depends_on:
      - backend

volumes:
  fe_node_modules:
